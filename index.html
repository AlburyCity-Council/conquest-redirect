<!DOCTYPE html>
<html>
<body>
<!-- v2 -->
<script>
  (function () {
    const search = window.location.search || '';
    let raw = search.startsWith('?url=') ? search.slice(5) : new URLSearchParams(search).get('url');
    if (!raw) return;

    let target = raw;
    try { target = decodeURIComponent(raw); } catch (_) {}

    if (!target.startsWith('conquest://')) return;

    // Launch C4 link
    window.location.href = target;

    // Try to auto-close this helper tab
    setTimeout(() => {
      try { window.close(); } catch (_) {}
      try { window.open('', '_self'); window.close(); } catch (_) {}
    }, 700);
  })();
</script>
</body>
</html>
