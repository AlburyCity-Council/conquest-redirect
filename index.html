<!DOCTYPE html>
<html>
<body>
<!-- v5 -->
<p id="fallback" style="font-family: Arial, sans-serif; font-size: 14px; color: #444;">
  Opening Conquest 4 link...
  <br><br>
  Please approve the pop-up to allow the Conquest 4 link.
  Please ensure you are logged into Conquest 4 before opening links.
  <br><br>
  This  tab will auto close after 3 seconds.
</p>

<script>
  (function () {
    const search = window.location.search || '';
    let raw = search.startsWith('?url=')
      ? search.slice(5)
      : new URLSearchParams(search).get('url');

    if (!raw) {
      document.getElementById('fallback').textContent = 'Invalid link. You can close this tab.';
      return;
    }

    let target = raw;
    try { target = decodeURIComponent(raw); } catch (_) {}

    if (!target.startsWith('conquest://')) {
      document.getElementById('fallback').textContent = 'Invalid link type. You can close this tab.';
      return;
    }

    window.location.href = target;

    setTimeout(() => {
      try { window.close(); } catch (_) {}
      try { window.open('', '_self'); window.close(); } catch (_) {}
    }, 3000);
  })();
</script>
</body>
</html>
